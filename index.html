<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷蔵庫レスキュー検索ver2</title>
<style>
  :root{
    --bg:#f6f7f9; --panel:#ffffff; --panel2:#f0f2f5;
    --ink:#1a1d24; --sub:#6b7280; --line:#e3e6ec;
    --accent:#e65c00; --accent-d:#cc5200; --accent2:#f59e0b; --blue:#2f6fd0;
    --shadow:0 1px 3px rgba(20,25,40,.06),0 4px 16px rgba(20,25,40,.05);
    --shadow-h:0 4px 12px rgba(230,92,0,.14),0 8px 28px rgba(20,25,40,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg); color:var(--ink); font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif; line-height:1.6; padding:22px 18px 60px; max-width:880px; margin:0 auto;}
  header{margin-bottom:20px}
  h1{font-size:1.62rem; letter-spacing:.01em; font-weight:800}
  h1 span{color:var(--accent)}
  .lead{color:var(--sub); font-size:.9rem; margin-top:5px}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:20px; margin-bottom:18px; box-shadow:var(--shadow)}
  .controls{display:grid; gap:18px}
  .field label{display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px; font-size:.8rem; color:var(--sub); margin-bottom:9px; letter-spacing:.03em; font-weight:600}

  .chips{display:flex; flex-wrap:wrap; gap:8px}
  .chip{padding:8px 15px; border-radius:22px; background:var(--panel); color:var(--ink); border:1.5px solid var(--line); cursor:pointer; font-size:.88rem; transition:.13s; user-select:none; font-weight:500}
  .chip:hover{border-color:var(--accent); color:var(--accent)}
  .chip.on{background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 7px rgba(230,92,0,.25)}
  .chip.on:hover{color:#fff}

  .andor{display:inline-flex; gap:0; background:var(--panel2); border:1px solid var(--line); border-radius:9px; padding:3px}
  .ao{background:none; border:none; color:var(--sub); font-size:.78rem; font-weight:700; padding:6px 13px; border-radius:6px; cursor:pointer; transition:.13s; white-space:nowrap}
  .ao:hover{color:var(--ink)}
  .ao.on{background:var(--blue); color:#fff; box-shadow:0 1px 5px rgba(47,111,208,.3)}

  .count{color:var(--sub); font-size:.86rem; margin-top:16px; font-weight:600}

  .results{display:flex; flex-direction:column; gap:11px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 18px; cursor:pointer; transition:.16s; display:flex; justify-content:space-between; align-items:center; gap:12px; box-shadow:var(--shadow)}
  .card:hover{border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--shadow-h)}
  .card .name{font-weight:700; font-size:1.03rem}
  .card .en{font-size:.77rem; color:var(--sub); margin-top:2px}
  .tags{display:flex; gap:6px; margin-top:7px; flex-wrap:wrap}
  .tag{font-size:.71rem; padding:3px 9px; border-radius:20px; background:var(--panel2); color:#4b5563; border:1px solid var(--line); font-weight:500}
  .rightcol{display:flex; align-items:center; white-space:nowrap}
  .empty{text-align:center; color:var(--sub); padding:46px 16px; background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:var(--shadow)}

  .overlay{position:fixed; inset:0; background:rgba(20,25,40,.42); display:none; align-items:center; justify-content:center; padding:20px; z-index:10; backdrop-filter:blur(2px)}
  .overlay.on{display:flex}
  .modal{background:var(--panel); border-radius:18px; padding:26px; max-width:520px; width:100%; max-height:84vh; overflow:auto; box-shadow:0 12px 48px rgba(20,25,40,.22)}
  .modal h2{font-size:1.32rem; margin-bottom:4px; padding-right:30px}
  .modal .en{font-size:.84rem; color:var(--sub); margin-bottom:14px}
  .modal .tags{margin-bottom:18px}
  .searchbtns{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px}
  .searchbtns a{flex:1; min-width:130px; text-align:center; text-decoration:none; background:var(--blue); color:#fff; padding:12px; border-radius:10px; font-weight:700; font-size:.94rem; transition:.13s}
  .searchbtns a:hover{filter:brightness(1.08); transform:translateY(-1px)}
  .notice{font-size:.78rem; color:#6b5800; background:#fffaf0; border-left:3px solid var(--accent2); padding:11px 13px; border-radius:0 8px 8px 0; line-height:1.55}
  .close{float:right; background:none; color:var(--sub); font-size:1.5rem; padding:0; line-height:1; cursor:pointer; font-weight:400; transition:.12s}
  .close:hover{color:var(--ink)}

/* 変更前：グループ化用のCSS を以下に差し替え */
  details.ing-group { margin-bottom: 12px; background: var(--panel2); border-radius: 12px; border: 1px solid var(--line); transition: .2s; }
  details.ing-group[open] { padding-bottom: 14px; background: var(--panel); border-color: var(--accent); box-shadow: var(--shadow); }
  summary.ing-label { font-size: 0.85rem; color: var(--ink); font-weight: 700; padding: 12px 14px; cursor: pointer; user-select: none; list-style: none; display: flex; align-items: center; justify-content: space-between; }
  summary.ing-label::-webkit-details-marker { display: none; }
  summary.ing-label::after { content: '＋'; color: var(--sub); font-size: 1.2rem; font-weight: 400; line-height: 1; }
  details[open] summary.ing-label::after { content: '−'; color: var(--accent); }
  details .chips { padding: 0 14px; }
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 18px; cursor:pointer; transition:.16s; display:flex; flex-wrap:wrap; align-items:flex-start; gap:12px; box-shadow:var(--shadow)}
  .leftcol{flex:1 1 auto; min-width:0;}
  .tag{font-size:.71rem; padding:3px 9px; border-radius:20px; background:var(--panel2); color:#4b5563; border:1px solid var(--line); font-weight:500; white-space:nowrap;}
  .rightcol{display:flex; align-items:center; white-space:nowrap; margin-left:auto;}
</style>
</head>
<body>
<header>
  <h1>冷蔵庫<span>レスキューver2</span></h1>
  <p class="lead">余っている食材を選ぶと、作れる定番料理を提案します。</p>
</header>

<div class="panel">
  <div class="controls" id="controls"></div>
  <div class="count" id="count"></div>
</div>

<div class="results" id="results"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="close">×</button>
    <h2 id="m-title"></h2>
    <div class="en" id="m-en"></div>
    <div class="tags" id="m-tags"></div>
    <div class="searchbtns">
      <a id="m-ja" target="_blank" rel="noopener">Googleでレシピを調べる</a>
    </div>
    <div class="notice">ボタンを押すとGoogle検索結果が新しいタブで開きます。具体的な分量や調理手順は検索先のレシピサイトをご参照ください。</div>
  </div>
</div>

<script src="data.js"></script>
<script>
const $ = id => document.getElementById(id);

// 検索ステート管理
let sel = { ingredients: [], mode: "and" };

// データセットから全食材を動的に抽出し、出現頻度順にソート
const freq = {};
RECIPES.forEach(r => r.ingredients.forEach(i => freq[i] = (freq[i] || 0) + 1));
const uniqueIngredients = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);

// 食材の分類用マッピング
const ING_CATEGORIES = [
  { name: "🥩 肉・魚介類", items: ["豚肉", "鶏肉", "牛肉", "ひき肉", "鮭", "サバ", "エビ", "イカ", "タコ", "ホタテ", "アサリ", "サンマ", "カレイ", "カツオ", "イワシ", "ブリ", "タラ", "マグロ", "うなぎ", "シラス", "魚のアラ"] },
  { name: "🥬 野菜・きのこ", items: ["玉ねぎ", "にんじん", "じゃがいも", "キャベツ", "ピーマン", "大根", "白菜", "もやし", "ねぎ", "きのこ", "ごぼう", "ほうれん草", "小松菜", "なす", "きゅうり", "トマト", "ニラ", "れんこん", "かぼちゃ", "さつまいも", "大葉", "かぶ", "長ねぎ", "しいたけ", "えのき", "春菊", "マッシュルーム", "ダイコン", "ネギ", "ショウガ", "ニンニク", "ゴボウ", "レモン"] },
  { name: "🥚 その他（卵・豆腐・主食など）", items: ["豆腐", "卵", "油揚げ", "こんにゃく", "わかめ", "昆布", "チーズ", "ごはん", "うどん", "そば", "厚揚げ", "大豆", "キムチ", "ごま", "梅干し", "のり", "ツナ", "ソーセージ", "かまぼこ", "ハム", "うずらの卵", "ひじき", "切り干し大根"] }
];

function renderControls() {
  const c = $('controls');
  
  // 食材をカテゴリごとに振り分けるハッシュマップ
  const grouped = { "🥩 肉・魚介類": [], "🥬 野菜・きのこ": [], "🥚 その他（卵・豆腐・主食など）": [] };
  
  // 動的抽出した食材をマッピングに沿って分配
  uniqueIngredients.forEach(i => {
    let matched = false;
    for (const cat of ING_CATEGORIES) {
      if (cat.items.includes(i)) {
        grouped[cat.name].push(i);
        matched = true;
        break;
      }
    }
    if (!matched) grouped["🥚 その他（卵・豆腐・主食など）"].push(i);
  });

  // UIの組み立て
  let html = `
    <div class="field">
      <label>
        <span>使いたい食材（複数選択可）</span>
        <span class="andor" id="andor">
          <button class="ao ${sel.mode==='or'?'on':''}" data-m="or">どれかで作れる</button>
          <button class="ao ${sel.mode==='and'?'on':''}" data-m="and">すべて使い切る</button>
        </span>
      </label>
      <div id="ing-container">
  `;

  // カテゴリごとにアコーディオンブロックを生成
  for (const catName in grouped) {
    if (grouped[catName].length === 0) continue;
    const chips = grouped[catName].map(i => `<div class="chip ${sel.ingredients.includes(i) ? 'on' : ''}" data-val="${i}">${i}</div>`).join('');
    
    // 選択中の食材が含まれているカテゴリ、または「肉・魚介」はデフォルトで開いておく
    const hasSelected = grouped[catName].some(i => sel.ingredients.includes(i));
    const isOpen = (catName === "🥩 肉・魚介類" || hasSelected) ? 'open' : '';

    html += `
        <details class="ing-group" ${isOpen}>
          <summary class="ing-label">${catName}</summary>
          <div class="chips">${chips}</div>
        </details>
    `;
  }
  
  html += `</div></div>`;
  c.innerHTML = html;

  // イベントリスナーの付与
  $('ing-container').onclick = e => {
    if (!e.target.classList.contains('chip')) return;
    const v = e.target.dataset.val;
    const idx = sel.ingredients.indexOf(v);
    if (idx < 0) sel.ingredients.push(v);
    else sel.ingredients.splice(idx, 1);
    renderControls();
    search();
  };

  $('andor').onclick = e => {
    const m = e.target.closest('.ao')?.dataset.m;
    if (!m) return;
    sel.mode = m;
    renderControls();
    search();
  };
}

function search() {
  let hits = RECIPES.filter(r => {
    if (sel.ingredients.length === 0) return true;
    if (sel.mode === 'and') {
      return sel.ingredients.every(i => r.ingredients.includes(i));
    } else {
      return sel.ingredients.some(i => r.ingredients.includes(i));
    }
  });
  
  // ソート：不足している食材が少ない順（＝今ある材料だけで作りやすい順）に並び替え
  hits.sort((a, b) => {
    const missingA = a.ingredients.filter(i => !sel.ingredients.includes(i)).length;
    const missingB = b.ingredients.filter(i => !sel.ingredients.includes(i)).length;
    return missingA - missingB;
  });
  
  render(hits);
}

// 差集合（レシピ食材 - 選択中食材）を計算し、右カラムのUIを生成
function renderRightCol(r) {
  if (sel.ingredients.length === 0) {
    const levelMap = { "Beginner": "🔰 簡単", "Intermediate": "🍳 普通", "Advanced": "🔥 手間" };
    return `<span style="font-size:0.8rem; color:var(--sub); font-weight:600;">${levelMap[r.level] || r.level}</span>`;
  }

  const missing = r.ingredients.filter(i => !sel.ingredients.includes(i));

  if (missing.length === 0) {
    return `<span style="font-size:0.75rem; font-weight:700; color:#059669; background:#d1fae5; padding:4px 8px; border-radius:6px; border:1px solid #10b981;">✨ すぐ作れる</span>`;
  } else {
    return `<span style="font-size:0.75rem; font-weight:600; color:var(--accent-d);">不足: ${missing.join('・')}</span>`;
  }
}

function renderTags(r) {
  let html = `<span class="tag">${r.category}</span>`;
  r.ingredients.forEach(i => html += `<span class="tag">${i}</span>`);
  return html;
}

function render(list) {
  $('count').textContent = `${list.length} 件ヒット`;
  const box = $('results');
  if (!list.length) {
    box.innerHTML = '<div class="empty">条件に合うレシピが見つかりませんでした。<br>食材の条件を減らしてお試しください。</div>';
    return;
  }
  box.innerHTML = '';
  list.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="leftcol"><div class="name">${r.ja}</div><div class="en">${r.en}</div><div class="tags">${renderTags(r)}</div></div><div class="rightcol">${renderRightCol(r)}</div>`;
    card.onclick = () => openModal(r);
    box.appendChild(card);
  });
}

function openModal(r) {
  $('m-title').textContent = r.ja;
  $('m-en').textContent = r.en;
  $('m-tags').innerHTML = renderTags(r);
  $('m-ja').href = 'https://www.google.com/search?q=' + encodeURIComponent(r.ja + ' レシピ 作り方') + '&udm=14';
  $('overlay').classList.add('on');
  history.pushState({modal: true}, '');
}

function closeModal(fromPop) {
  if (!$('overlay').classList.contains('on')) return;
  $('overlay').classList.remove('on');
  if (!fromPop && history.state && history.state.modal) { history.back(); }
}

window.addEventListener('popstate', () => { if ($('overlay').classList.contains('on')) closeModal(true); });
$('close').onclick = () => closeModal(false);
$('overlay').onclick = ev => { if (ev.target === $('overlay')) closeModal(false); };

// 初期化
renderControls();
search();
</script>
</body>
</html>
