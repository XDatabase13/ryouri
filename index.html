<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冷蔵庫レスキュー検索</title>
<link rel="stylesheet" href="style.css?v=2">
</head>
<body>
<header>
  <h1>冷蔵庫<span>レスキューver3</span></h1>
  <p class="lead">余っている食材を選ぶと、作れる定番料理を提案します。</p>
</header>

<div class="panel">
  <div class="controls" id="controls"></div>
  <div class="count" id="count"></div>
</div>

<div class="results" id="results"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="close" id="close">×</button>
    <h2 id="m-title"></h2>
    <div class="en" id="m-en"></div>
    <div class="tags" id="m-tags"></div>
    <div class="searchbtns">
      <a id="m-ja" target="_blank" rel="noopener">Googleでレシピを調べる</a>
    </div>
    <div class="notice">ボタンを押すとGoogle検索結果が新しいタブで開きます。具体的な分量や調理手順は検索先のレシピサイトをご参照ください。</div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="disclaimer.html">免責事項</a>
  </div>
</footer>

<script src="data.js"></script>
<script>
const $ = id => document.getElementById(id);

// 検索ステート管理
let sel = { ingredients: [], mode: "and" };

// データセットから全食材を動的に抽出し、出現頻度順にソート
const freq = {};
RECIPES.forEach(r => r.ingredients.forEach(i => freq[i] = (freq[i] || 0) + 1));
const uniqueIngredients = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);

// 食材の分類用マッピング
const ING_CATEGORIES = [
  { name: "🥩 肉・魚介類", items: ["豚肉", "鶏肉", "牛肉", "ひき肉", "鮭", "サバ", "エビ", "イカ", "タコ", "ホタテ", "アサリ", "サンマ", "カレイ", "カツオ", "イワシ", "ブリ", "タラ", "マグロ", "うなぎ", "シラス", "魚のアラ"] },
  { name: "🥬 野菜・きのこ", items: ["玉ねぎ", "にんじん", "じゃがいも", "キャベツ", "ピーマン", "大根", "白菜", "もやし", "ねぎ", "きのこ", "ごぼう", "ほうれん草", "小松菜", "なす", "きゅうり", "トマト", "ニラ", "れんこん", "かぼちゃ", "さつまいも", "大葉", "かぶ", "長ねぎ", "しいたけ", "えのき", "春菊", "マッシュルーム", "ダイコン", "ネギ", "ショウガ", "ニンニク", "ゴボウ", "レモン"] },
  { name: "🥚 その他（卵・豆腐・主食など）", items: ["豆腐", "卵", "油揚げ", "こんにゃく", "わかめ", "昆布", "チーズ", "ごはん", "うどん", "そば", "厚揚げ", "大豆", "キムチ", "ごま", "梅干し", "のり", "ツナ", "ソーセージ", "かまぼこ", "ハム", "うずらの卵", "ひじき", "切り干し大根"] }
];

function renderControls() {
  const c = $('controls');
  
  // 食材をカテゴリごとに振り分けるハッシュマップ
  const grouped = { "🥩 肉・魚介類": [], "🥬 野菜・きのこ": [], "🥚 その他（卵・豆腐・主食など）": [] };
  
  // 動的抽出した食材をマッピングに沿って分配
  uniqueIngredients.forEach(i => {
    let matched = false;
    for (const cat of ING_CATEGORIES) {
      if (cat.items.includes(i)) {
        grouped[cat.name].push(i);
        matched = true;
        break;
      }
    }
    if (!matched) grouped["🥚 その他（卵・豆腐・主食など）"].push(i);
  });

  // UIの組み立て
  let html = `
    <div class="field">
      <label>
        <span>使いたい食材（複数選択可）</span>
        <span class="andor" id="andor">
          <button class="ao ${sel.mode==='or'?'on':''}" data-m="or">どれかで作れる</button>
          <button class="ao ${sel.mode==='and'?'on':''}" data-m="and">すべて使い切る</button>
        </span>
      </label>
      <div id="ing-container">
  `;

  // カテゴリごとにアコーディオンブロックを生成
  for (const catName in grouped) {
    if (grouped[catName].length === 0) continue;
    const chips = grouped[catName].map(i => `<div class="chip ${sel.ingredients.includes(i) ? 'on' : ''}" data-val="${i}">${i}</div>`).join('');
    
    // 選択中の食材が含まれているカテゴリ、または「肉・魚介」はデフォルトで開いておく
    const hasSelected = grouped[catName].some(i => sel.ingredients.includes(i));
    const isOpen = (catName === "🥩 肉・魚介類" || hasSelected) ? 'open' : '';

    html += `
        <details class="ing-group" ${isOpen}>
          <summary class="ing-label">${catName}</summary>
          <div class="chips">${chips}</div>
        </details>
    `;
  }
  
  html += `</div></div>`;
  c.innerHTML = html;

  // イベントリスナーの付与
  $('ing-container').onclick = e => {
    if (!e.target.classList.contains('chip')) return;
    const v = e.target.dataset.val;
    const idx = sel.ingredients.indexOf(v);
    if (idx < 0) sel.ingredients.push(v);
    else sel.ingredients.splice(idx, 1);
    renderControls();
    search();
  };

  $('andor').onclick = e => {
    const m = e.target.closest('.ao')?.dataset.m;
    if (!m) return;
    sel.mode = m;
    renderControls();
    search();
  };
}

function search() {
  let hits = RECIPES.filter(r => {
    if (sel.ingredients.length === 0) return true;
    if (sel.mode === 'and') {
      return sel.ingredients.every(i => r.ingredients.includes(i));
    } else {
      return sel.ingredients.some(i => r.ingredients.includes(i));
    }
  });
  
  // ソート：不足している食材が少ない順（＝今ある材料だけで作りやすい順）に並び替え
  hits.sort((a, b) => {
    const missingA = a.ingredients.filter(i => !sel.ingredients.includes(i)).length;
    const missingB = b.ingredients.filter(i => !sel.ingredients.includes(i)).length;
    return missingA - missingB;
  });
  
  render(hits);
}

// 差集合（レシピ食材 - 選択中食材）を計算し、右カラムのUIを生成
function renderRightCol(r) {
  if (sel.ingredients.length === 0) {
    const levelMap = { "Beginner": "🔰 簡単", "Intermediate": "🍳 普通", "Advanced": "🔥 手間" };
    return `<span style="font-size:0.8rem; color:var(--sub); font-weight:600;">${levelMap[r.level] || r.level}</span>`;
  }

  const missing = r.ingredients.filter(i => !sel.ingredients.includes(i));

  if (missing.length === 0) {
    return `<span style="font-size:0.75rem; font-weight:700; color:#059669; background:#d1fae5; padding:4px 8px; border-radius:6px; border:1px solid #10b981;">✨ すぐ作れる</span>`;
  } else {
    return `<span style="font-size:0.75rem; font-weight:600; color:var(--accent-d);">不足: ${missing.join('・')}</span>`;
  }
}

function slugify(en) {
  return en.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
}

function renderTags(r) {
  let html = `<span class="tag">${r.category}</span>`;
  r.ingredients.forEach(i => html += `<span class="tag">${i}</span>`);
  return html;
}

function render(list) {
  $('count').textContent = `${list.length} 件ヒット`;
  const box = $('results');
  if (!list.length) {
    box.innerHTML = '<div class="empty">条件に合うレシピが見つかりませんでした。<br>食材の条件を減らしてお試しください。</div>';
    return;
  }
  box.innerHTML = '';
  list.forEach(r => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="leftcol"><div class="name">${r.ja}</div><div class="en">${r.en}</div><div class="tags">${renderTags(r)}</div></div><div class="rightcol">${renderRightCol(r)}</div>`;
    card.onclick = () => { window.location.href = 'recipes/' + slugify(r.en) + '.html'; };
    box.appendChild(card);
  });
}

function openModal(r) {
  $('m-title').textContent = r.ja;
  $('m-en').textContent = r.en;
  $('m-tags').innerHTML = renderTags(r);
  $('m-ja').href = 'https://www.google.com/search?q=' + encodeURIComponent(r.ja + ' レシピ 作り方') + '&udm=14';
  $('overlay').classList.add('on');
  history.pushState({modal: true}, '');
}

function closeModal(fromPop) {
  if (!$('overlay').classList.contains('on')) return;
  $('overlay').classList.remove('on');
  if (!fromPop && history.state && history.state.modal) { history.back(); }
}

window.addEventListener('popstate', () => { if ($('overlay').classList.contains('on')) closeModal(true); });
$('close').onclick = () => closeModal(false);
$('overlay').onclick = ev => { if (ev.target === $('overlay')) closeModal(false); };

// 初期化
renderControls();
search();
</script>
</body>
</html>
